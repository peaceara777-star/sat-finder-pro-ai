# Sat Finder Pro AI - uWSGI Configuration
# الإصدار 4.1.0

[uwsgi]
# Project Settings
module = app:app
chdir = /var/www/sat-finder-pro-ai
home = /var/www/sat-finder-pro-ai/venv

# Socket
socket = /var/run/satfinder.sock
chmod-socket = 666
socket-timeout = 120

# Process Settings
master = true
processes = 4
threads = 2
enable-threads = true

# Worker Management
max-requests = 5000
max-requests-delta = 500
harakiri = 120
harakiri-verbose = true
reload-on-rss = 256
reload-mercy = 10
worker-reload-mercy = 10

# Logging
logto = /var/log/satfinder/uwsgi.log
log-maxsize = 104857600
log-backupname = /var/log/satfinder/uwsgi.log.backup
logformat = "%(addr) - %(user) [%(ltime)] \"%(method) %(uri) %(proto)\" %(status) %(size) \"%(referer)\" \"%(uagent)\" %(msecs)ms"

# Stats
stats = /var/run/satfinder-stats.sock
stats-http = true
stats-server = 127.0.0.1:9191

# Security
uid = www-data
gid = www-data
umask = 022
no-default-app = true
need-app = true

# Performance
buffer-size = 32768
post-buffering = 8192
listen = 128

# Environment
env = FLASK_ENV=production
env = PYTHONPATH=/var/www/sat-finder-pro-ai

# Cache
cache2 = name=satcache,items=10000,blocksize=4096

# Queue
queue = 100
queue-blocksize = 4096

# Async
async = 100
ugreen = true

# Monitoring
attach-daemon = /var/www/sat-finder-pro-ai/scripts/monitor.sh

# Hooks
hook-pre-app = exec:echo "🚀 Sat Finder Pro AI uWSGI Starting..."
hook-post-app = exec:echo "✅ Sat Finder Pro AI uWSGI Started"
hook-as-user-atexit = exec:echo "🛑 Sat Finder Pro AI uWSGI Stopped"
