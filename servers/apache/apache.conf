# Sat Finder Pro AI - Apache Configuration
# الإصدار 4.1.0

<VirtualHost *:80>
    ServerName satfinder.example.com
    ServerAdmin admin@satfinder.example.com
    
    # Redirect to HTTPS
    Redirect permanent / https://satfinder.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName satfinder.example.com
    ServerAdmin admin@satfinder.example.com
    
    # Document Root
    DocumentRoot /var/www/sat-finder-pro-ai
    
    # Directory Settings
    <Directory /var/www/sat-finder-pro-ai>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Rewrite Rules
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
    
    # API Proxy
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/
    
    # AI API with timeout
    ProxyPass /api/ai/ http://127.0.0.1:5000/api/ai/ timeout=120
    ProxyPassReverse /api/ai/ http://127.0.0.1:5000/api/ai/
    
    # Node.js API
    ProxyPass /node-api/ http://127.0.0.1:3000/
    ProxyPassReverse /node-api/ http://127.0.0.1:3000/
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/satfinder.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/satfinder.example.com/privkey.pem
    
    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://generativelanguage.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com;"
    
    # Compression
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    
    # Cache Control
    <FilesMatch "\.(ico|pdf|jpg|jpeg|png|gif|js|css|swf|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/satfinder-error.log
    CustomLog ${APACHE_LOG_DIR}/satfinder-access.log combined
    
    # Rate Limiting
    <Location /api/ai/>
        SetEnvIf User-Agent ".*" rate_limit_burst=5
        SetEnvIf User-Agent ".*" rate_limit_delay=200
    </Location>
    
    # Deny .htaccess and .htpasswd
    <Files ".ht*">
        Require all denied
    </Files>
    
    # Deny hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
</VirtualHost>
