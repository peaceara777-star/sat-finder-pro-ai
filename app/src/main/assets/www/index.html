<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<title>Sat Finder Pro AI</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js"));
}
</script>
</head>
<body>

<div id="splash"><div class="loader"></div><p>Loading...</p></div>

<button id="toggleDebug" class="debug-btn">DEV</button>

<div id="debugOverlay">
  <p>Heading: <span id="dbgHeading">0</span></p>
  <p>Diff: <span id="dbgDiff">0</span></p>
  <p>Intensity: <span id="dbgIntensity">0</span></p>
</div>

<button id="openSettings" class="settings-btn">⚙️</button>
<div id="settingsPanel" class="settings-panel">
  <h2>Settings</h2>

  <label>Theme</label>
  <select id="themeSelect">
    <option value="cyan">Cyan Neon</option>
    <option value="green">Green Radar</option>
    <option value="red">Red Alert</option>
    <option value="purple">Purple Glow</option>
    <option value="neon">Neon Mix</option>
    <option value="gold">Gold</option>
    <option value="ice">Blue Ice</option>
    <option value="fire">Fire</option>
  </select>

  <label>Needle Size</label>
  <input type="range" id="needleSize" min="80" max="200" value="140">

  <label>Radar Speed</label>
  <input type="range" id="radarSpeed" min="1" max="10" value="4">

  <label>Sound Type</label>
  <select id="soundType">
    <option value="radar">Radar</option>
    <option value="ping">Ping</option>
    <option value="click">Click</option>
    <option value="sweep">Sweep</option>
  </select>

  <label>Volume</label>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">

  <label>Vibration</label>
  <input type="checkbox" id="vibrationToggle" checked>

  <button id="saveSettings">Save</button>
  <button id="resetSettings" class="reset-btn">Reset</button>
</div>

<div id="app">
  <h1 class="title">Sat Finder Pro AI</h1>

  <div id="compassContainer">
    <div id="compassRing"></div>
    <div id="glowSweep"></div>
    <div id="fogLayer"></div>
    <div id="innerSweep"></div>
    <div id="compassGlow"></div>
    <div id="glassEffect"></div>
    <div id="pulseEffect"></div>
    <div id="needleReflection"></div>
    <div id="compassNeedle"></div>
    <div id="compassCenter"></div>
  </div>

  <div id="infoPanel">
    <div>Heading: <span id="headingValue">0°</span></div>
    <div>Moon Azimuth: <span id="moonAzimuth">130°</span></div>
    <div>Diff: <span id="diffValue">0°</span></div>
  </div>
</div>

<audio id="soundRadar" preload="auto"></audio>
<audio id="sweepSound" preload="auto" src="assets/sounds/sweep.mp3"></audio>

<script src="js/app.js"></script>
</body></html>
