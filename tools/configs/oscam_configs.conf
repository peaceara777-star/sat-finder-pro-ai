# =====================================================
# Oscam Configuration - Sat Finder Pro AI
# =====================================================

# oscam.conf
[global]
logfile                       = /tmp/oscam.log
clienttimeout                 = 5000
fallbacktimeout               = 2500
bindwait                      = 20
nice                          = -1
maxlogsize                    = 1000
waitforcards                  = 0
preferlocalcards              = 1
dropdups                      = 1

[webif]
httpport                      = 8888
httpuser                      = admin
httppwd                       = admin
httpallowed                   = 127.0.0.1,192.168.0.0-192.168.255.255

[dvbapi]
enabled                       = 1
au                            = 1
pmt_mode                      = 0
delayer                       = 60
user                          = localuser
boxtype                       = dreambox

# oscam.server
[reader]
label                         = cccam_server
protocol                      = cccam
device                        = server.ddns.net,12000
user                          = username
password                      = password
inactivitytimeout             = 30
group                         = 1
cccversion                    = 2.3.2
ccckeepalive                  = 1

[reader]
label                         = newcamd_server
protocol                      = newcamd
device                        = server.ddns.net,12000
key                           = 0102030405060708091011121314
user                          = username
password                      = password
group                         = 1

[reader]
label                         = card_reader
protocol                      = internal
device                        = /dev/sci0
caid                          = 0604
detect                        = cd
mhz                           = 500
cardmhz                       = 500
group                         = 1
emmcache                      = 1,3,2
boxid                         = 12345678

# oscam.user
[account]
user                          = user1
pwd                           = pass1
group                         = 1
uniq                          = 1
au                            = 1
keepalive                     = 1

[account]
user                          = user2
pwd                           = pass2
group                         = 1
uniq                          = 1
au                            = 0
keepalive                     = 1

# oscam.dvbapi
P: 0604 1
P: 1811 1
P: 0100 1
I: 0
