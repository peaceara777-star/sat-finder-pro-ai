name: Upload APK to Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Upload APKs
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/app-debug.apk
          dist/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
